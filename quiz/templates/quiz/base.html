<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}منصة المسابقات الكتابية{% endblock %}</title>
    <link rel="icon" type="image/jpeg" href="https://www.image2url.com/r2/default/images/1781534601894-1d027ee9-d4ec-424c-a2db-c657d7b391c1.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --gold: #D4AF37; --dark-gold: #996515; --beige: #F5F5DC;
            --white: #FFFFFF; --text-color: #3e2723; --success: #28a745; --error: #dc3545;
        }
        body {
            font-family: 'Tajawal', sans-serif; background-color: var(--beige);
            color: var(--text-color); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; box-sizing: border-box;
        }
        /* الهيدر الدائري الموحد للشعار الرسمي */
        .logo-header {
            width: 100px; height: 100px; border-radius: 50%;
            border: 3px solid var(--gold); box-shadow: 0 4px 15px rgba(212,175,55,0.2);
            object-fit: cover; margin-bottom: 15px; margin-top: 20px;
        }
        {% block extra_style %}{% endblock %}
    </style>
</head>
<body>
    <img src="https://www.image2url.com/r2/default/images/1781534601894-1d027ee9-d4ec-424c-a2db-c657d7b391c1.jpg" alt="Logo" class="logo-header">

    {% block content %}{% endblock %}

    {% block extra_js %}{% endblock %}
</body>
</html>
